<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vocabulary representation of the Hadden Industries ontology.">
    <title>Ontology Vocabulary</title>
    <!-- Link to our shared premium stylesheet -->
    <link rel="stylesheet" href="ontology_styles.css">
</head>
<body>

    <main class="table-wrapper">
        <div class="toolbar">
            <div class="dropdown" id="col-dropdown">
                <button class="dropdown-toggle" id="col-toggle">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                    Columns
                </button>
                <div class="dropdown-menu" id="col-menu">
                    <!-- Checkboxes injected via JavaScript -->
                </div>
            </div>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th scope="col" data-sort="objectType">Entity Type</th>
                        <th scope="col" title="Universally Unique Identifier" data-sort="uuid">UUID</th>
                        <th scope="col" title="Uniform Resource Identifier" data-sort="uri">URI</th>
                        <th scope="col" data-sort="preferredLabel">Preferred Label</th>
                        <th scope="col" data-sort="definition">Definition</th>
                        <th scope="col" data-sort="sources">Sources</th>
                        <th scope="col" data-sort="creator">Creator</th>
                        <th scope="col" data-sort="createdAt">Created At</th>
                        <th scope="col" data-sort="modifiedAt">Modified At</th>
                        <th scope="col" data-sort="subClassOf">Superclasses</th>
                        <th scope="col" data-sort="classOfNamedIndividual">Class of Named Individual</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Rows injected via JavaScript -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Import the shared logic library -->
    <script src="ontology_processor.js"></script>
    
    <script>
        // Store the returned data locally for the export function
        let localExtractedData = [];
        let ontologyContext = {};
        let currentSortCol = null;
        let currentSortAsc = true;
        let hiddenColumns = new Set();
        
        // Dynamic style block for hiding columns
        const colStyleElement = document.createElement('style');
        document.head.appendChild(colStyleElement);

        function updateColumnVisibility() {
            let cssText = '';
            hiddenColumns.forEach(index => {
                // CSS :nth-child is 1-based
                cssText += `table th:nth-child(${index + 1}), table td:nth-child(${index + 1}) { display: none !important; }\n`;
            });
            colStyleElement.textContent = cssText;
        }

        function initColumnDropdown() {
            const headers = document.querySelectorAll('thead th');
            const menu = document.getElementById('col-menu');
            
            headers.forEach((th, index) => {
                // Extract just the text node, excluding the sort icon HTML
                const text = th.childNodes[0].textContent.trim();
                const label = document.createElement('label');
                label.className = 'dropdown-item';
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = true; // Columns visible by default
                
                checkbox.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        hiddenColumns.delete(index);
                    } else {
                        hiddenColumns.add(index);
                    }
                    updateColumnVisibility();
                });
                
                label.appendChild(checkbox);
                label.appendChild(document.createTextNode(text));
                menu.appendChild(label);
            });

            const toggleBtn = document.getElementById('col-toggle');
            toggleBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                menu.classList.toggle('show');
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!menu.contains(e.target) && e.target !== toggleBtn) {
                    menu.classList.remove('show');
                }
            });
        }

        function renderTable(data) {
            const tbody = document.getElementById("table-body");
            tbody.innerHTML = "";

            data.forEach(row => {
                const tr = document.createElement("tr");
                
                const entityType = getEntityType(row["@type"]);
                const uuid = getUuid(row);
                const uri = row["@id"] || "";
                const preferredLabel = getPreferredLang(row["skos:prefLabel"]);
                const definition = getPreferredLang(row["skos:definition"]);
                let sourcesList = [];
                const rawSources = row["dcterms:source"];
                if (rawSources) {
                    if (Array.isArray(rawSources)) {
                        sourcesList = rawSources.map(src => {
                            if (typeof src === 'object' && src !== null) {
                                return getPreferredLang(src);
                            }
                            return expandURI(src, ontologyContext);
                        });
                    } else if (typeof rawSources === 'object') {
                        sourcesList = [getPreferredLang(rawSources)];
                    } else {
                        sourcesList = [expandURI(rawSources, ontologyContext)];
                    }
                }
                const sources = sourcesList;
                const creator = expandURI(row["dcterms:creator"] || "", ontologyContext);
                const createdAt = row["dcterms:created"] || "";
                const modifiedAt = row["dcterms:modified"] || "";
                const superclassesHtml = formatSubClassOfHtml(row["rdfs:subClassOf"], ontologyContext);
                const classOfNamedIndividual = getClassOfNamedIndividual(row, ontologyContext);

                tr.innerHTML = `
                    <td><span class="badge">${escapeHTML(entityType)}</span></td>
                    <td><span class="code-text">${escapeHTML(uuid)}</span></td>
                    <td><span class="code-text">${createLink(uri, true)}</span></td>
                    <td style="font-weight: 500;">${escapeHTML(preferredLabel)}</td>
                    <td class="wrap-text">${escapeHTML(definition)}</td>
                    <td><span class="code-text">${sources.map(src => createLink(src, false)).join('<br>')}</span></td>
                    <td><span class="code-text">${createLink(creator, true)}</span></td>
                    <td>${escapeHTML(createdAt).replace('T', '<wbr>T')}</td>
                    <td>${escapeHTML(modifiedAt).replace('T', '<wbr>T')}</td>
                    <td class="wrap-text"><span class="code-text">${superclassesHtml}</span></td>
                    <td><span class="code-text">${createLink(classOfNamedIndividual, true)}</span></td>
                `;
                
                tbody.appendChild(tr);
            });
        }

        function getSortValue(row, column) {
            if (!row) return '';
            let val;
            switch(column) {
                case 'objectType':
                    val = getEntityType(row["@type"]);
                    break;
                case 'uuid':
                    val = getUuid(row);
                    break;
                case 'uri':
                    val = row["@id"] || "";
                    break;
                case 'preferredLabel':
                    val = getPreferredLang(row["skos:prefLabel"]);
                    break;
                case 'definition':
                    val = getPreferredLang(row["skos:definition"]);
                    break;
                case 'sources':
                    let srcVal = row["dcterms:source"];
                    if (!srcVal) {
                        val = '';
                    } else if (Array.isArray(srcVal)) {
                        val = srcVal.map(s => typeof s === 'object' ? getPreferredLang(s) : s).join('');
                    } else if (typeof srcVal === 'object') {
                        val = getPreferredLang(srcVal);
                    } else {
                        val = srcVal;
                    }
                    break;
                case 'creator':
                    val = row["dcterms:creator"] || '';
                    break;
                case 'createdAt':
                    val = row["dcterms:created"] || '';
                    break;
                case 'modifiedAt':
                    val = row["dcterms:modified"] || '';
                    break;
                case 'subClassOf':
                    const sc = row["rdfs:subClassOf"] || [];
                    const list = Array.isArray(sc) ? sc : [sc];
                    val = list.filter(item => typeof item === 'string').join('');
                    break;
                case 'classOfNamedIndividual':
                    val = getClassOfNamedIndividual(row);
                    break;
                default:
                    val = '';
            }
            return String(val).toLowerCase();
        }

        function handleSort(column) {
            if (currentSortCol === column) {
                currentSortAsc = !currentSortAsc;
            } else {
                currentSortCol = column;
                currentSortAsc = true;
            }

            document.querySelectorAll('th[data-sort]').forEach(th => {
                const icon = th.querySelector('.sort-icon');
                if (icon) {
                    if (th.getAttribute('data-sort') === column) {
                        icon.innerHTML = currentSortAsc ? '&#9650;' : '&#9660;';
                        icon.classList.add('active');
                    } else {
                        icon.innerHTML = '&#9650;&#9660;';
                        icon.classList.remove('active');
                    }
                }
            });

            localExtractedData.sort((a, b) => {
                let valA = getSortValue(a, column);
                let valB = getSortValue(b, column);

                if (valA < valB) return currentSortAsc ? -1 : 1;
                if (valA > valB) return currentSortAsc ? 1 : -1;
                return 0;
            });

            renderTable(localExtractedData);
        }

        document.addEventListener("DOMContentLoaded", async () => {
            // Initialize sorting listeners
            document.querySelectorAll('th[data-sort]').forEach(th => {
                th.innerHTML += ' <span class="sort-icon">&#9650;&#9660;</span>';
                th.addEventListener('click', () => handleSort(th.getAttribute('data-sort')));
            });

            // Initialize column visibility dropdown
            initColumnDropdown();

            const isLocalEnv = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:";
            let targetUrl;

            if (isLocalEnv) {
                targetUrl = "https://haddenindustries.com/ontology/universal/reference-data/latest";
            } else {
                const pathname = window.location.pathname;
                const basePath = pathname.substring(0, pathname.lastIndexOf('/'));
                targetUrl = window.location.origin + basePath;
            }
            
            try {
                // Call the shared library which strictly returns JSON-LD data
                const result = await fetchOntologyAsJsonLd(targetUrl);
                
                // Update UI based on the returned title (using language map)
                if (result && result["dcterms:title"]) {
                    const titleText = getPreferredLang(result["dcterms:title"]);
                    const displayTitle = `${titleText} Vocabulary`;
                    document.title = displayTitle;
                }
                
                // Render table and enable CSV download if data exists
                if (result && result["@graph"] && result["@graph"].length > 0) {
                    ontologyContext = result["@context"] || {};
                    
                    // Filter out dcat:Dataset and dcat:Distribution from representation
                    localExtractedData = result["@graph"].filter(row => {
                        const type = row["@type"];
                        if (Array.isArray(type)) {
                            return !type.includes("dcat:Dataset") && !type.includes("dcat:Distribution");
                        }
                        return type !== "dcat:Dataset" && type !== "dcat:Distribution";
                    });
                    
                    renderTable(localExtractedData);
                }
            } catch (error) {
                console.error("Processing error:", error);
            }
        });
    </script>
</body>
</html>
